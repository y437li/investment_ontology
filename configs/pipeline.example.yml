run_name: demo_ai_infra_asof_2024_06_30
as_of_date: "2024-06-30"

# Issue #29: per-task LLM model selection. Read at runtime from
# <CONFIG_DIR>/pipeline.yml (this example is the template). Empty string or a
# missing key means "not overridden" -> resolution falls through to `default`,
# then env LLM_MODEL_NAME. No hardcoded provider model strings ship here.
llm_models:
  default: ""                    # empty -> falls back to env LLM_MODEL_NAME (no env expansion in YAML)
  embedding: ""                  # reserved; no consumer yet
  extraction: ""                 # per-task override; empty -> use default/env
  disambiguation: ""
  theme_naming: ""
  explanation: ""
  report: ""

input:
  documents_dir: data/inputs/documents
  market_dir: data/inputs/market
  fundamentals_dir: data/inputs/fundamentals

chunking:
  chunk_size: 800
  chunk_overlap: 120

extraction:
  llm_enabled: true
  min_edge_confidence: 0.55
  require_edge_evidence: true
  max_chunks_per_batch: 8

graph:
  community_algorithm: leiden
  min_community_size: 3
  edge_weight_field: confidence

interpretation:
  llm_theme_naming: true
  max_theme_summary_words: 120

outputs:
  run_output_dir: data/runs
  cache_dir: data/cache

