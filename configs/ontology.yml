# The Investment Ontology — managed source of truth for WHAT the engine extracts
# and keeps. Extraction prompts are generated from this table; extraction output
# is validated against it. Edit here to change extraction behavior — not in code.
version: 1

# Core definitions — what the engine's two primitives ARE.
definitions:
  node: >
    A typed, evidence-grounded ENTITY in the graph. Must (1) map to exactly one
    entity_type below, which fixes its factor level; (2) be grounded in >=1 evidence
    chunk available at as_of; (3) survive denoise (no dates/persons/tickers-as-
    entities/boilerplate). Identified by a stable id + canonical name (aliases
    merged). Document nodes are evidence-only and excluded from discovery. Every
    node answers: what it is, why it is in the graph, why it matters (spec section 13).
  theme: >
    A SLICE of the one connected graph (anchor + propagation + filter), realized as
    a community of structurally-connected nodes (default: Louvain over
    document_stated structural edges; also sliceable by factor level). SUBSTANTIVE
    when it has >=3 nodes and non-zero strength; non-substantive fragments are kept
    for audit but hidden from the PM. Carries: factor-level composition + dominant
    level; a temporal state at as_of (emerging/mature/declining/dormant); metrics
    (strength, cohesion; temporal metrics like novelty need a multi-snapshot run); a
    connect-the-dots narrative with an ordered, provenance-labeled derivation; and a
    place in the main-theme -> sub-theme hierarchy. Not fixed — it depends on the slice.

# Entity types. `level` places the type in the factor hierarchy
# (macro -> industry -> company -> idiosyncratic; `contextual` = supporting).
entity_types:
  Company:
    level: company
    definition: A specific operating company (ideally in the universe).
    keep: true
  Sector:
    level: industry
    definition: An industry or sector grouping (e.g. Oil & Gas, Banks).
    keep: true
  Commodity:
    level: macro
    definition: A traded commodity (oil, natural gas, uranium, gold, copper, potash).
    keep: true
  MacroIndicator:
    level: macro
    definition: A macroeconomic indicator (interest rates, inflation, FX, GDP).
    keep: true
  EconomicConcept:
    level: contextual
    definition: An economic theme, driver, or mechanism (energy transition, supply chain).
    keep: true
  Event:
    level: idiosyncratic
    definition: A material, dated corporate or market event (lawsuit, fine, M&A, incident).
    keep: true
  Geography:
    level: contextual
    definition: A place that contextualizes an asset, market, or operation.
    keep: true
  Document:
    level: evidence
    definition: A source document node (evidence traceability only; excluded from discovery).
    keep: true

# Never extract these as entities (denoise).
exclude:
  - dates and time expressions
  - person names / signatories
  - ticker symbols as standalone entities
  - document or form metadata (Form 6-K, registrant, EDGAR/SEDAR)
  - legal / procedural boilerplate (Foreign Private Issuer, Annual Meeting)

# Edge types. `structural` edges drive community/slice discovery and exposure;
# evidence/contextual edges are kept for traceability but excluded from discovery.
edge_types:
  causes:        {structural: true,  directed: true,  definition: A drives or causes B.}
  benefits:      {structural: true,  directed: true,  definition: A benefits B.}
  hurts:         {structural: true,  directed: true,  definition: A hurts or pressures B.}
  exposed_to:    {structural: true,  directed: true,  definition: A is exposed to B.}
  sensitive_to:  {structural: true,  directed: true,  definition: A is sensitive to B.}
  located_in:    {structural: false, directed: true,  definition: A is located in B.}
  co_occurs_with: {structural: false, directed: false, definition: A co-occurs with B in evidence.}
  mentioned_in:  {structural: false, directed: true,  definition: A is mentioned in document B (evidence only).}

# Extraction rules enforced after the LLM returns.
rules:
  entity_must_have_known_type: true   # drop entities whose type is not above
  edge_must_have_known_type: true     # drop edges whose type is not above
  document_stated_edge_requires_evidence: true
