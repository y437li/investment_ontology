# The Investment Ontology — managed source of truth for WHAT the engine extracts
# and keeps. Extraction prompts are generated from this table; extraction output
# is validated against it. Edit here to change extraction behavior — not in code.
version: 1

# Core definitions — what the engine's two primitives ARE.
definitions:
  node: >
    A typed, evidence-grounded ENTITY in the graph. Must (1) map to exactly one
    entity_type below, which fixes its factor level; (2) be grounded in >=1 evidence
    chunk available at as_of; (3) survive denoise (no dates/persons/tickers-as-
    entities/boilerplate). Identified by a stable id + canonical name (aliases
    merged). Document nodes are evidence-only and excluded from discovery. Every
    node answers: what it is, why it is in the graph, why it matters (spec section 13).
  theme: >
    A SLICE of the one connected graph (anchor + propagation + filter), realized as
    a community of structurally-connected nodes (default: Louvain over
    document_stated structural edges; also sliceable by factor level). SUBSTANTIVE
    when it has >=3 nodes and non-zero strength; non-substantive fragments are kept
    for audit but hidden from the PM. Carries: factor-level composition + dominant
    level; a temporal state at as_of (emerging/mature/declining/dormant); metrics
    (strength, cohesion; temporal metrics like novelty need a multi-snapshot run); a
    connect-the-dots narrative with an ordered, provenance-labeled derivation; and a
    place in the main-theme -> sub-theme hierarchy. Not fixed — it depends on the slice.

# Entity types. `level` places the type in the factor hierarchy
# (macro -> industry -> company -> idiosyncratic; `contextual` = supporting).
entity_types:
  Company:
    level: company
    definition: A specific operating company (ideally in the universe).
    keep: true
  Sector:
    level: industry
    definition: An industry or sector grouping (e.g. Oil & Gas, Banks).
    keep: true
  Commodity:
    level: macro
    definition: A traded commodity (oil, natural gas, uranium, gold, copper, potash).
    keep: true
  MacroIndicator:
    level: macro
    definition: A macroeconomic indicator (interest rates, inflation, FX, GDP).
    keep: true
  EconomicConcept:
    level: contextual
    definition: An economic theme, driver, or mechanism (energy transition, supply chain).
    keep: true
  Event:
    level: idiosyncratic
    definition: A material, dated corporate or market event (lawsuit, fine, M&A, incident).
    keep: true
  Geography:
    level: contextual
    definition: A place that contextualizes an asset, market, or operation.
    keep: true
  Document:
    level: evidence
    definition: A source document node (evidence traceability only; excluded from discovery).
    keep: true
  FinancialMetric:
    level: company
    definition: >
      A quantified financial metric claim (reported actual or guidance/forward-looking),
      extracted from narrative text (MD&A, earnings transcripts, news). Carries
      metric_name (from fundamentals.yml vocabulary), value, unit, period, direction,
      is_guidance flag, and the source evidence chunk. Attached to its Company via
      reports (as-reported) or guides_to (guidance) edges.
    keep: true
  Sentiment:
    level: company
    definition: >
      A structured management-sentiment judgment extracted from management-attributable
      text (MD&A sections, earnings call transcripts). Carries speaker_role, direction
      (positive/negative/neutral/mixed), confidence_tone, hedging, forward_stance, and
      the source evidence chunk. Attached to its Company via expresses_sentiment edges.
      Produced by the SENT-B LLM management-sentiment pass; grounded in SENT-A lexicon
      hits. Discovery-evidence only — NOT scored into exposure.
    keep: true

# Never extract these as entities (denoise).
exclude:
  - dates and time expressions
  - person names / signatories
  - ticker symbols as standalone entities
  - document or form metadata (Form 6-K, registrant, EDGAR/SEDAR)
  - legal / procedural boilerplate (Foreign Private Issuer, Annual Meeting)

# Edge types. `structural` edges drive community/slice discovery and exposure;
# evidence/contextual edges are kept for traceability but excluded from discovery.
#
# `base_polarity` — signed polarity for forward-inference propagation (FI-A/FI-B):
#   +1  edge conveys a positive/same-direction signal (source benefits or drives target)
#   -1  edge conveys a negative/opposite-direction signal (source hurts target)
#    0  edge is undirected, evidence-only, or excluded from signed propagation
#
# For `causes`, `exposed_to`, `sensitive_to` the base_polarity is +1 because
# the source→target convention encodes a positive causal / exposure direction.
# When a future `direction` field is added to edges.parquet (e.g. "positive" /
# "negative"), graph_build will multiply base_polarity by that direction multiplier.
# Until then, the config value is the sole source of polarity.
edge_types:
  causes:        {structural: true,  directed: true,  base_polarity:  1, definition: A drives or causes B.}
  benefits:      {structural: true,  directed: true,  base_polarity:  1, definition: A benefits B.}
  hurts:         {structural: true,  directed: true,  base_polarity: -1, definition: A hurts or pressures B.}
  exposed_to:    {structural: true,  directed: true,  base_polarity:  1, definition: A is exposed to B.}
  sensitive_to:  {structural: true,  directed: true,  base_polarity:  1, definition: A is sensitive to B.}
  located_in:    {structural: false, directed: true,  base_polarity:  0, definition: A is located in B.}
  co_occurs_with: {structural: false, directed: false, base_polarity:  0, definition: A co-occurs with B in evidence.}
  mentioned_in:  {structural: false, directed: true,  base_polarity:  0, definition: A is mentioned in document B (evidence only).}
  reports:       {structural: true,  directed: true,  base_polarity:  1, definition: Company A reports a FinancialMetric B (as-reported actual; XBRL wins on overlap).}
  guides_to:     {structural: true,  directed: true,  base_polarity:  1, definition: Company A provides guidance toward a FinancialMetric B (forward-looking / narrative).}
  expresses_sentiment: {structural: false, directed: true, base_polarity: 0, definition: Company A expresses a management Sentiment B (discovery-evidence only; not scored into exposure). Attribution via speaker_role field on the Sentiment node.}

# Extraction rules enforced after the LLM returns.
rules:
  entity_must_have_known_type: true   # drop entities whose type is not above
  edge_must_have_known_type: true     # drop edges whose type is not above
  document_stated_edge_requires_evidence: true
