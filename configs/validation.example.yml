forward_windows:
  - 1M
  - 3M

# Minimal forward coverage required before a run can be scored.
# Keys are holding windows and values are months of required market history.
forward_coverage_months:
  1M: 1
  3M: 3

# Basket construction parameters.
# basket_top_n: maximum number of top-exposed companies per theme basket.
basket_top_n: 10
# random_seed: deterministic seed for random-community baseline benchmark.
random_seed: 42

# Walk-forward schedule: >= 3 monthly as-of dates required for a valid panel.
# Single-snapshot validation (run_validation) is ILLUSTRATIVE only.
# A statistical/excess-return claim requires run_walk_forward_validation with
# n_points >= sweep.min_points_for_claim.
walk_forward:
  # Explicit walk-forward schedule for a sweep. Must contain >= 3 monthly dates
  # (min_snapshot_gap_days apart) before any claim is supported.
  as_of_dates:
    - "2024-03-31"
    - "2024-06-30"
    - "2024-09-30"
  # Alias for sweep.min_points_for_claim; used by walk-forward validation gate.
  min_snapshots: 3
  require_coverage: true
  min_snapshot_gap_days: 28

# Sweep config: parameters for run_walk_forward_validation panel execution.
# forward_window: holding window applied at each as_of point (OI-7 LOCKED: 3M).
# on_insufficient_coverage: policy when a point lacks full forward price coverage.
#   "skip"   — the point is excluded from n_points and not measured (OI-7 LOCKED).
#   "shrink" — not allowed; always skip.
# baseline: benchmark used for per-point excess calculation.
# min_points_for_claim: minimum valid points before claim_supported=true is emitted.
#   Single-snapshot (n_points < min_points_for_claim) always yields illustrative=true,
#   claim_supported=false. A claim requires a walk-forward panel with sufficient points.
sweep:
  forward_window: 3M
  on_insufficient_coverage: skip
  baseline: equal_weight_universe
  min_points_for_claim: 3

benchmarks:
  - equal_weight_universe
  - sector_equal_weight
  - random_community_baseline

metrics:
  - forward_return
  - excess_return

optional_fundamentals:
  - revenue_growth
  - eps_revision

rules:
  freeze_discovery_before_validation: true
  require_as_of_date: true
  reject_missing_available_at: true
  reject_insufficient_forward_data: true
